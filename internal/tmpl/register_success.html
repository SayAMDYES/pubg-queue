{{ define "register_success.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报名成功 - 趴布鸡排队</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐔</text></svg>">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="site-header">
  <div class="container">
    <a href="/" class="logo"><span class="logo-icon">🐔</span> 趴布鸡排队</a>
  </div>
</header>
<main class="container">
<div class="result-box">
  <h2>✓ 报名成功</h2>
  <p><strong>{{ .Name }}</strong>（{{ .MaskedPhone }}）</p>
  {{ if eq .Status "assigned" }}
  <p class="text-gold" style="font-size:1rem;font-weight:600">🎮 已获得队伍席位</p>
  {{ else }}
  <p style="color:var(--amber);font-size:1rem;font-weight:600">⏳ 已加入候补名单，有席位将自动晋升</p>
  {{ end }}

  <div class="alert alert-warning" style="text-align:left;margin-top:1.5rem">
    <strong>离队方式：</strong>前往活动页面，在"离队"区域输入手机号和密码即可退出报名。
  </div>

  <div class="btn-group">
    <a href="/date/{{ .EventDate }}" class="btn btn-primary">返回活动页</a>
    <a href="/" class="btn btn-secondary">返回首页</a>
  </div>
</div>
</main>
<footer class="site-footer">
  <div class="container"><p>趴布鸡排队系统 &copy; 2024</p></div>
</footer>
</body>
</html>
{{ end }}

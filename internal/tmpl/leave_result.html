{{ define "leave_result.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>离队成功 - 趴布鸡排队</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="site-header">
  <div class="container">
    <a href="/" class="logo"><span class="logo-icon">🐔</span> 趴布鸡排队</a>
  </div>
</header>
<main class="container">
<div class="result-box">
  <h2>👋 已成功离队</h2>
  <p><strong>{{ .LeftName }}</strong> 已离开队伍。</p>
  {{ if .PromotedName }}
  <p style="color:var(--green);font-weight:600">🎉 候补玩家 <strong>{{ .PromotedName }}</strong> 已自动晋升入队！</p>
  {{ end }}
  <div class="btn-group">
    {{ if .EventDate }}
    <a href="/date/{{ .EventDate }}" class="btn btn-primary">返回活动页</a>
    {{ end }}
    <a href="/" class="btn btn-secondary">返回首页</a>
  </div>
</div>
</main>
<footer class="site-footer">
  <div class="container"><p>趴布鸡排队系统 &copy; 2024</p></div>
</footer>
</body>
</html>
{{ end }}

{{ define "admin_event_form.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }} - 趴布鸡排队</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="site-header">
  <div class="container">
    <a href="/" class="logo">🐔 趴布鸡排队</a>
    <nav><a href="/admin" class="nav-link">返回后台</a></nav>
  </div>
</header>
<main class="container">
<h2>{{ .Title }}</h2>
{{ if .Event }}
<form method="POST" action="/admin/events/{{ .Event.EventDate }}">
{{ else }}
<form method="POST" action="/admin/events">
{{ end }}
  <input type="hidden" name="gorilla.csrf.Token" value="{{ .CSRFToken }}">
  <div class="form-group">
    <label>活动日期</label>
    <input type="date" name="event_date" required {{ if .Event }}value="{{ .Event.EventDate }}"{{ end }}>
  </div>
  <div class="form-group">
    <label>队伍数量</label>
    <input type="number" name="team_count" min="1" max="10" required {{ if .Event }}value="{{ .Event.TeamCount }}"{{ else }}value="2"{{ end }}>
  </div>
  <div class="form-group">
    <label>开始时间（可选，例如 20:00）</label>
    <input type="time" name="start_time" {{ if .Event }}value="{{ .Event.StartTime }}"{{ end }}>
  </div>
  <div class="form-group">
    <label>结束时间（可选，例如 23:00）</label>
    <input type="time" name="end_time" {{ if .Event }}value="{{ .Event.EndTime }}"{{ end }}>
  </div>
  <div class="form-group">
    <label>备注（可选）</label>
    <textarea name="note" rows="3">{{ if .Event }}{{ .Event.Note }}{{ end }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">保存</button>
  <a href="/admin" class="btn btn-secondary">取消</a>
</form>
</main>
</body>
</html>
{{ end }}

{{ define "admin_login.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员登录 - 趴布鸡排队</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="site-header">
  <div class="container">
    <a href="/" class="logo"><span class="logo-icon">🐔</span> 趴布鸡排队</a>
  </div>
</header>
<main class="container">
<div class="login-box">
  <h2>🔐 管理员登录</h2>
  {{ if .ErrMsg }}<div class="alert alert-error">用户名或密码错误，请重试</div>{{ end }}
  <form method="POST" action="/admin/login">
    <input type="hidden" name="gorilla.csrf.Token" value="{{ .CSRFToken }}">
    <input type="hidden" name="username" value="admin">
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input type="text" value="admin" disabled class="form-control" style="opacity:0.5;cursor:not-allowed">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input type="password" name="password" required autocomplete="current-password" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem">登录</button>
  </form>
</div>
</main>
</body>
</html>
{{ end }}

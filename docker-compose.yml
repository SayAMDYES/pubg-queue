version: "3.8"
services:
  pubg-queue:
    build:
      context: .
      args:
        - GOPROXY=${GOPROXY:-https://proxy.golang.org,direct}
        - GONOSUMDB=${GONOSUMDB:-}
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org}
        - USE_VENDOR=${USE_VENDOR:-0}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/pubg_queue.db
      - PORT=${PORT:-8080}
      - SESSION_SECRET=${SESSION_SECRET}
      - CSRF_SECRET=${CSRF_SECRET}
      - TZ=Asia/Shanghai
      - SECURE_COOKIE=${SECURE_COOKIE:-false}
      - PUBG_API_KEY=${PUBG_API_KEY:-}
      - PUBG_SHARD=${PUBG_SHARD:-steam}
      - ALLOW_DUPLICATE_NAME=${ALLOW_DUPLICATE_NAME:-false}
      - RATE_LIMIT_REGISTER=${RATE_LIMIT_REGISTER:-5}
      - RATE_LIMIT_LEAVE=${RATE_LIMIT_LEAVE:-5}
    command: ["--admin-pass", "${ADMIN_PASS}"]
    restart: unless-stopped

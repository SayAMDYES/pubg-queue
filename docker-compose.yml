version: "3.8"
services:
  pubg-queue:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/pubg_queue.db
      - PORT=8080
      - SESSION_SECRET=${SESSION_SECRET}
      - CSRF_SECRET=${CSRF_SECRET}
      - TZ=Asia/Shanghai
      - SECURE_COOKIE=false
    command: ["./pubg-queue", "--admin-pass", "${ADMIN_PASS}"]
    restart: unless-stopped
